<template>
    <lightning-card title="Sales Cloud Daily Health Check" icon-name="standard:dashboard">
 
        <!-- ── Header bar ──────────────────────────────────────────────── -->
        <div slot="actions">
            <lightning-button-group>
                <lightning-button
                    label="Refresh Automated Checks"
                    icon-name="utility:refresh"
                    onclick={handleRefreshAutomated}
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button
                    label="Save Manual Entries"
                    icon-name="utility:save"
                    variant="neutral"
                    onclick={handleSave}
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button
                    label="Send Health Check Email"
                    icon-name="utility:email"
                    variant="brand"
                    onclick={handleSendEmail}
                    disabled={isSendDisabled}>
                </lightning-button>
            </lightning-button-group>
        </div>
 
        <div class="slds-p-around_medium">
 
            <!-- Loading spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </template>
 
            <!-- ── Status banner ────────────────────────────────────────── -->
            <template if:false={isLoading}>
                <div class={overallBannerClass}>
                    <span class="slds-icon_container slds-m-right_x-small">
                        <lightning-icon
                            icon-name={overallIcon}
                            size="small"
                            alternative-text="Status">
                        </lightning-icon>
                    </span>
                    Check Date: {checkDateLabel}
                    &nbsp;&nbsp;|&nbsp;&nbsp;
                    <template if:true={emailSent}>
                        <lightning-badge label="Email Sent" class="slds-badge_success"></lightning-badge>
                    </template>
                    <template if:false={emailSent}>
                        <lightning-badge label="Email Not Sent Yet"></lightning-badge>
                    </template>
                    <template if:true={hasPending}>
                        &nbsp;&nbsp;
                        <lightning-badge
                            label={pendingBadgeLabel}
                            class="badge-pending">
                        </lightning-badge>
                    </template>
                </div>
 
                <!-- ── Toast messages ──────────────────────────────────── -->
                <template if:true={toastMessage}>
                    <div class={toastClass} role="alert">
                        <span>{toastMessage}</span>
                    </div>
                </template>
 
                <!-- ── AUTOMATED SECTIONS ──────────────────────────────── -->
                <div class="slds-section slds-is-open slds-m-top_medium">
                    <h3 class="slds-section__title section-title-auto">
                        <lightning-icon icon-name="utility:bot" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        Automated Checks ({automatedCount}) — Status &amp; Details are editable
                    </h3>
                    <div class="slds-section__content">
                        <div class="hc-table-wrap">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped hc-table">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col" style="width:15%">Section</th>
                                    <th scope="col" style="width:18%">Sub-Section</th>
                                    <th scope="col" style="width:12%">Status</th>
                                    <th scope="col" style="width:7%">Total</th>
                                    <th scope="col" style="width:7%">Used</th>
                                    <th scope="col" style="width:8%">Remaining</th>
                                    <th scope="col">Details</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={automatedLogs} for:item="log">
                                    <tr key={log.Id} class={log.rowClass}>
                                        <td>{log.KPMG_Section__c}</td>
                                        <td>{log.KPMG_Sub_Section__c}</td>
                                        <td class="auto-edit-cell">
                                            <lightning-combobox
                                                variant="label-hidden"
                                                label="Status"
                                                value={log.KPMG_Status__c}
                                                options={statusOptions}
                                                data-id={log.Id}
                                                data-field="KPMG_Status__c"
                                                onchange={handleAutomatedFieldChange}>
                                            </lightning-combobox>
                                        </td>
                                        <td class="slds-text-align_right">{log.totalFormatted}</td>
                                        <td class="slds-text-align_right">{log.usedFormatted}</td>
                                        <td class="slds-text-align_right">{log.remainingFormatted}</td>
                                        <td class="auto-edit-cell">
                                            <lightning-textarea
                                                variant="label-hidden"
                                                label="Details"
                                                value={log.KPMG_Details__c}
                                                max-length="5000"
                                                data-id={log.Id}
                                                data-field="KPMG_Details__c"
                                                onchange={handleAutomatedFieldChange}>
                                            </lightning-textarea>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>
 
                <!-- ── LISTING SECTIONS (Scheduled Jobs / Service Accounts) ─ -->
                <template if:true={hasListings}>
                    <template for:each={listingSections} for:item="ls">
                        <div key={ls.key} class="slds-section slds-is-open slds-m-top_medium">
                            <h3 class="slds-section__title section-title-auto">
                                <lightning-icon icon-name="utility:table" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                {ls.name}
                            </h3>
                            <div class="slds-section__content">
                                <div class="hc-table-wrap">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped hc-table">
                                        <thead>
                                            <tr class="slds-line-height_reset">
                                                <template for:each={ls.headerCells} for:item="h">
                                                    <th key={h.key} scope="col">{h.label}</th>
                                                </template>
                                                <th scope="col" class="slds-text-align_center">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={ls.rows} for:item="row">
                                                <tr key={row.key} class={row.rowClass}>
                                                    <template for:each={row.cells} for:item="cell">
                                                        <td key={cell.key}>{cell.value}</td>
                                                    </template>
                                                    <td class="auto-edit-cell slds-text-align_center">
                                                        <lightning-combobox
                                                            variant="label-hidden"
                                                            label="Status"
                                                            value={row.statusValue}
                                                            options={statusOptions}
                                                            data-id={row.id}
                                                            onchange={handleListingStatusChange}>
                                                        </lightning-combobox>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </template>
                </template>
 
                <!-- ── MANUAL SECTIONS ──────────────────────────────────── -->
                <div class="slds-section slds-is-open slds-m-top_medium">
                    <h3 class="slds-section__title section-title-manual">
                        <lightning-icon icon-name="utility:edit" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        Manual Entries ({manualCount}) — Fill in and click "Send Health Check Email"
                    </h3>
                    <div class="slds-section__content">
                        <template for:each={manualSectionGroups} for:item="group">
                            <div key={group.sectionName} class="slds-m-bottom_small">
                                <div class="manual-section-header">{group.sectionName}</div>
                                <template for:each={group.items} for:item="log">
                                    <div key={log.Id} class="slds-card slds-m-bottom_x-small manual-card">
 
                                        <!-- Item title (full width) -->
                                        <div class="manual-item-title">{log.KPMG_Sub_Section__c}</div>
 
                                        <!-- Field row: columns sum to 12 -->
                                        <div class="slds-grid slds-gutters_small slds-wrap slds-grid_vertical-align-start">
 
                                            <!-- Status picklist -->
                                            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12">
                                                <lightning-combobox
                                                    name={log.Id}
                                                    label="Status"
                                                    value={log.KPMG_Status__c}
                                                    options={statusOptions}
                                                    data-id={log.Id}
                                                    data-field="KPMG_Status__c"
                                                    onchange={handleManualFieldChange}>
                                                </lightning-combobox>
                                            </div>
 
                                            <!-- Details -->
                                            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                                                <lightning-textarea
                                                    label="Details / Observations"
                                                    value={log.KPMG_Details__c}
                                                    max-length="5000"
                                                    data-id={log.Id}
                                                    data-field="KPMG_Details__c"
                                                    onchange={handleManualFieldChange}>
                                                </lightning-textarea>
                                            </div>
 
                                            <!-- Comments / Next Steps -->
                                            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                                                <lightning-textarea
                                                    label="Comments / Next Steps"
                                                    value={log.KPMG_Comments__c}
                                                    max-length="3000"
                                                    data-id={log.Id}
                                                    data-field="KPMG_Comments__c"
                                                    onchange={handleManualFieldChange}>
                                                </lightning-textarea>
                                            </div>
 
                                            <!-- Jira / Ticket + Recurring -->
                                            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12">
                                                <lightning-input
                                                    type="text"
                                                    label="Jira / Ticket Ref"
                                                    value={log.KPMG_Jira_Reference__c}
                                                    max-length="255"
                                                    data-id={log.Id}
                                                    data-field="KPMG_Jira_Reference__c"
                                                    onchange={handleManualFieldChange}>
                                                </lightning-input>
                                                <lightning-input
                                                    type="checkbox"
                                                    label="Recurring?"
                                                    class="slds-m-top_x-small"
                                                    checked={log.KPMG_Is_Recurring__c}
                                                    data-id={log.Id}
                                                    data-field="KPMG_Is_Recurring__c"
                                                    onchange={handleManualCheckboxChange}>
                                                </lightning-input>
                                            </div>
 
                                        </div>
 
                                        <!-- Screenshot (full width row) -->
                                        <div class="slds-grid slds-wrap slds-m-top_x-small">
                                            <div class="slds-col slds-size_1-of-1">
                                                <lightning-input-rich-text
                                                    label="Screenshot"
                                                    label-visible
                                                    value={log.KPMG_Image__c}
                                                    data-id={log.Id}
                                                    data-field="KPMG_Image__c"
                                                    onchange={handleManualFieldChange}>
                                                </lightning-input-rich-text>
                                            </div>
                                        </div>
 
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
 
            </template>
        </div>
    </lightning-card>
</template>
